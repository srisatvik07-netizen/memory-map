<!DOCTYPE html>
<html>
<head>
    <title>Happy Birthday ❤️</title>

    <style>
        body{
            background: linear-gradient(to right,#ffdde1,#ee9ca7);
            font-family: Arial;
            text-align:center;
            padding-top:100px;
            color:white;
        }

        .box{
            background:white;
            color:black;
            width:350px;
            margin:auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 0px 15px gray;
        }

        input{
            width:80%;
            padding:12px;
            border-radius:10px;
            border:1px solid gray;
        }

        button{
            margin-top:15px;
            padding:12px 20px;
            border:none;
            border-radius:10px;
            background:hotpink;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        #msg{
            margin-top:10px;
            color:red;
        }
    </style>
</head>

<body>

<h1>🎀 Birthday Treasure Hunt 🎀</h1>

<div class="box">

<h2>Mission 1 ❤️</h2>

<p>
Do you want to know about our memory map?
</p>

<input type="text" id="answer">

<br>

<button onclick="check()">
Unlock
</button>

<p id="msg"></p>

</div>

<script>

function check(){

let ans =
document.getElementById("answer")
.value.toLowerCase();

if(ans === "yes"){

window.location.href="clue2.html";

}else{

document.getElementById("msg")
.innerHTML="worng answer 😝";

}

}

</script>

</body>
</html>
